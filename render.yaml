# ─────────────────────────────────────────────────────────────
# Blueprint Render — CertifTOGO
#
# Déploie 4 ressources : PostgreSQL managé, l'API Express, et les
# deux frontends React en sites statiques.
#
# ⚠️ Les migrations ne sont PAS jouées automatiquement :
#    migrations/001_init_schema.sql fait DROP TABLE sur les 10 tables.
#    L'automatiser viderait la base à chaque déploiement.
#    → voir docs/DEPLOIEMENT.md pour l'initialisation manuelle (une fois).
# ─────────────────────────────────────────────────────────────

databases:
  - name: certiftogo-db
    databaseName: certiftogo
    user: certiftogo
    plan: free
    region: frankfurt

services:
  # ── API Express ─────────────────────────────────────────────
  - type: web
    name: certiftogo-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Connexion interne au PostgreSQL managé (pas de SSL requis).
      - key: DATABASE_URL
        fromDatabase:
          name: certiftogo-db
          property: connectionString

      # Secrets générés par Render au premier déploiement.
      - key: JWT_SECRET
        generateValue: true
      - key: MINISTERE_SIGNING_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 24h
      - key: OTP_LENGTH
        value: '6'
      - key: OTP_EXPIRATION_MINUTES
        value: '5'

      # ── Ancrage blockchain (Polygon Amoy) ──────────────────
      - key: BLOCKCHAIN_MODE
        value: onchain
      - key: CONTRAT_ADRESSE
        value: '0x42d2e5EE482c365E5b4737C2d476D127732495F6'
      - key: BLOCKCHAIN_RPC_URL
        value: https://polygon-amoy-bor-rpc.publicnode.com
      # Secret : à saisir dans le dashboard Render, jamais versionné.
      - key: BLOCKCHAIN_PRIVATE_KEY
        sync: false

      # ── Notifications WhatsApp (Meta Cloud API) ────────────
      # Passer à "cloud" une fois le numéro et le template validés
      # par Meta. En "mock", le code OTP sort dans les logs Render.
      - key: WHATSAPP_MODE
        value: mock
      - key: WHATSAPP_TEMPLATE_NOM
        value: certiftogo_code_otp
      - key: WHATSAPP_TEMPLATE_LANGUE
        value: fr
      # Secrets : à saisir dans le dashboard Render.
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false

      # ── URLs publiques ─────────────────────────────────────
      # Render expose chaque service sur https://<nom>.onrender.com.
      # Si un nom est déjà pris, Render ajoute un suffixe : vérifier les
      # URLs réelles après le premier déploiement et corriger ici.
      - key: PUBLIC_BASE_URL
        value: https://certiftogo-api.onrender.com
      - key: PUBLIC_VERIFY_URL
        value: https://certiftogo-public.onrender.com/verifier
      - key: CORS_ORIGINS
        value: https://certiftogo-back-office.onrender.com,https://certiftogo-public.onrender.com

  # ── Back-office (React, privé/OTP) ──────────────────────────
  - type: web
    name: certiftogo-back-office
    runtime: static
    rootDir: frontend-back-office
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://certiftogo-api.onrender.com/api
      - key: VITE_PUBLIC_URL
        value: https://certiftogo-public.onrender.com
    routes:
      # SPA React Router : toute route inconnue retombe sur index.html.
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Front-office public (vérification) ──────────────────────
  - type: web
    name: certiftogo-public
    runtime: static
    rootDir: frontend-public
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://certiftogo-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
